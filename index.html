<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreamX IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: "Kanit", sans-serif;
  background: radial-gradient(circle at top, #1b1b2a, #0a0a10);
  color: #fff;
}

/* ===== PLAYER WRAPPER ===== */
.player-wrapper {
  max-width: 1100px;
  margin: 20px auto;
  padding: 15px;
}

.player-box {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
  background: #000;
}

/* glowing border */
.player-box::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  padding: 2px;
  background: linear-gradient(45deg,#00f5ff,#ff00d4,#00ff85);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0.5;
}

video {
  width: 100%;
  height: 460px;
  display: block;
  background: black;
}

/* ===== CHANNEL GRID ===== */
.grid {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.25s;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-6px);
  background: rgba(0,255,200,0.08);
  border-color: rgba(0,255,200,0.4);
  box-shadow: 0 10px 25px rgba(0,255,200,0.1);
}

.card img {
  width: 55px;
  height: 55px;
  object-fit: contain;
  margin-bottom: 8px;
}

.card div {
  font-size: 13px;
  opacity: 0.9;
}

/* title */
.header {
  text-align: center;
  font-size: 20px;
  padding: 10px;
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">📺 StreamX IPTV Player</div>

<!-- PLAYER -->
<div class="player-wrapper">
  <div class="player-box">
    <video id="video" controls autoplay></video>
  </div>
</div>

<!-- CHANNELS -->
<div class="grid" id="grid"></div>

<script>
const channels = [
  
  {
    name: "hd-ch3bkp",
    id: "hd-ch3bkp",
    logo: "https://images.streamx-web.org/images/tv/channels_icons/hd-ch3bkp.png"
  },
  {
      "name": "th-ch7",
      "id": "th-ch7",
      "logo": "https://images.streamx-web.org/images/tv/channels_icons/th-ch7.png"
  },
  {
      "name": "hd-thairath",
      "id": "hd-thairath",
      "logo": "https://images.streamx-web.org/images/tv/channels_icons/hd-thairath.png"
  },
  {
      "name": "th-max01",
      "id": "th-max01",
      "logo": "https://images.streamx-web.org/images/tv/png/th-max01.png"
   },
   {
      "name": "th-max02",
      "id": "th-max02",
      "logo": "https://images.streamx-web.org/images/tv/png/th-max02.png"
   }


];

const USER_SESSION = "8qql8mZWVicc1b7Thyg20zp1nS8i8297h5X1qhlSnqfQpjcA1A6a2fd470c6c34";

const video = document.getElementById("video");
let hls;

function play(url) {
  if (hls) hls.destroy();

  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
  } else {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }

  video.play();
}

async function loadChannel(id) {
  const api = `https://streamx-web.cc/api/tv/channels/play/?c=${id}&user_loggedsession=${USER_SESSION}&kauth=`;

  const res = await fetch(api);
  const text = await res.text();

  const xml = new DOMParser().parseFromString(text, "text/xml");
  const url = xml.querySelector("clear_url")?.textContent;

  if (url) play(url);
}

const grid = document.getElementById("grid");

channels.forEach(ch => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${ch.logo}">
    <div>${ch.name}</div>
  `;

  div.onclick = () => loadChannel(ch.id);
  grid.appendChild(div);
});

// autoplay
loadChannel(channels[0].id);
</script>

</body>
</html>
