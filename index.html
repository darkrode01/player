<!DOCTYPE html>
<html>
<body>

<button onclick="play('mono')">
MONO
</button>

<pre id="result"></pre>

<script>

async function play(channel){

  const res =
    await fetch(
      "https://iplay.thanathon-zank.workers.dev/?channel="
      + channel
    );

  const data =
    await res.json();

  document.getElementById("result")
    .textContent =
    JSON.stringify(data,null,2);
}

</script>

</body>
</html>
